# ================================
# Prometheus Configuration File
# ================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s


# ================================
# Alertmanager configuration
# ================================
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Example:
          # - "localhost:9093"


# ================================
# Rule files (alerts)
# ================================
rule_files:
  - "alerts.yml"


# ================================
# Scrape configurations
# ================================
scrape_configs:

  # Prometheus self monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"


  # FastAPI RAG Backend Monitoring
  - job_name: "fastapi-rag"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          app: "rag-backend"